<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing · Candidates</title>
<script>
if (sessionStorage.getItem("turing_auth") !== "true") {
  window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.search ? '/candidates.html' + window.location.search : '/candidates.html');
}
</script>
<style>
:root{--bg:#08090f;--bg2:#0f1220;--bg3:#161b2e;--border:#1e2a42;--blue:#2563eb;--blue2:#3b82f6;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:#fff;border-bottom:3px solid var(--blue);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;}
nav a{font-size:13px;color:#374151;text-decoration:none;}
nav a:hover{color:var(--blue);}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
.query-title{font-size:18px;font-weight:700;margin-bottom:4px;word-break:break-word;}
.meta{font-size:13px;color:var(--text2);margin-bottom:1.5rem;}
.stats{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.25rem;min-width:100px;}
.stat-val{font-size:22px;font-weight:700;line-height:1;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}
.filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.filter-btn{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.candidate{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;background:var(--bg2);}
.candidate.good{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.03);}
.candidate.acceptable{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.03);}
.candidate.bad{border-color:rgba(239,68,68,.15);}
.cand-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
.cand-pos{font-size:11px;color:var(--text3);min-width:28px;}
.cand-name{font-weight:600;font-size:14px;}
.cand-link{font-size:11px;color:var(--blue2);text-decoration:none;}
.badge{display:inline-flex;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge.green{background:rgba(16,185,129,.15);color:#34d399;}
.badge.yellow{background:rgba(245,158,11,.15);color:#fbbf24;}
.badge.red{background:rgba(239,68,68,.15);color:#f87171;}
.cand-reason{font-size:13px;color:var(--text2);line-height:1.5;}
.cand-score{font-size:11px;color:var(--text3);margin-top:4px;}
.loading{text-align:center;padding:4rem;color:var(--text2);}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;padding:12px 16px;border-radius:10px;font-size:13px;margin:1rem 0;}
.review-box{background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.2);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;}
.review-box-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px;}
.review-entry{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(37,99,235,.15);}
.review-entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.review-meta{font-size:11px;color:var(--blue2);font-weight:600;margin-bottom:4px;}
.review-text{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;}
</style>
</head>
<body>
<nav>
  <a href="/dashboard.html">← Dashboard</a>
  <div style="display:flex;gap:16px;">
    <a href="/">Search Tester</a>
    <button onclick="sessionStorage.removeItem('turing_auth');window.location.href='/login.html'" style="font-size:12px;padding:5px 12px;background:transparent;border:1px solid #ddd;border-radius:6px;cursor:pointer;color:#666;">Logout</button>
  </div>
</nav>

<div class="page">
  <div id="loading" class="loading">Loading candidates...</div>
  <div id="error" class="error" style="display:none"></div>
  <div id="content" style="display:none">
    <div class="query-title" id="query-title"></div>
    <div class="meta" id="meta"></div>
    <div class="stats" id="stats"></div>
    <div id="review-box"></div>
    <div class="filters">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="f-good" onclick="setFilter('good')">Good fits</button>
      <button class="filter-btn" id="f-acceptable" onclick="setFilter('acceptable')">Acceptable</button>
      <button class="filter-btn" id="f-bad" onclick="setFilter('bad')">Not a fit</button>
    </div>
    <div id="candidates-list"></div>
  </div>
</div>

<script>
var allCandidates = [];
var currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  ['all','good','acceptable','bad'].forEach(function(k) {
    document.getElementById('f-'+k).className = 'filter-btn' + (k===f?' active':'');
  });
  renderList();
}

function renderList() {
  var filtered = allCandidates.filter(function(c) {
    if (currentFilter === 'all') return true;
    var v = c.verdict || (c.match ? 'good' : 'bad');
    if (currentFilter === 'good') return v === 'good';
    if (currentFilter === 'acceptable') return v === 'borderline';
    if (currentFilter === 'bad') return v === 'bad' || (!c.match && v !== 'borderline');
    return true;
  });

  var html = filtered.map(function(c) {
    var v = c.verdict || (c.match ? 'good' : 'bad');
    var vDisplay = v === 'borderline' ? 'acceptable' : v;
    var vBadge = v === 'good' ? '<span class="badge green">good fit</span>' :
                 v === 'borderline' ? '<span class="badge yellow">acceptable</span>' :
                 '<span class="badge red">not a fit</span>';
    var link = c.candidate_id
      ? '<a href="https://matching.turing.com/developer/' + c.candidate_id + '" target="_blank" class="cand-link">profile ↗</a>'
      : '';
    return '<div class="candidate ' + vDisplay + '">' +
      '<div class="cand-header">' +
        '<span class="cand-pos">' + (c.position||'') + '</span>' +
        '<span class="cand-name">' + (c.candidate_name||'Unknown') + '</span>' +
        link + vBadge +
      '</div>' +
      '<div class="cand-reason">' + (c.reason||'—') + '</div>' +
      (c.score ? '<div class="cand-score">Score: ' + c.score + '/100</div>' : '') +
    '</div>';
  }).join('');

  if (!html) html = '<div style="color:var(--text2);padding:2rem 0;text-align:center">No candidates match this filter.</div>';
  document.getElementById('candidates-list').innerHTML = html;
}

window.addEventListener('load', async function() {
  var params = new URLSearchParams(window.location.search);
  var runId = params.get('run_id');
  var query = params.get('query') || '';
  var dateLabel = params.get('date') || '';

  if (!runId) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').textContent = 'No run_id provided.';
    document.getElementById('error').style.display = 'block';
    return;
  }

  document.getElementById('query-title').textContent = decodeURIComponent(query);
  document.getElementById('meta').textContent = dateLabel ? 'Run date: ' + decodeURIComponent(dateLabel) + ' · Run ID: ' + runId : 'Run ID: ' + runId;

  try {
    // Fetch candidates for this specific run
    var res = await fetch('/api/candidates?run_id=' + encodeURIComponent(runId) + '&query=' + encodeURIComponent(decodeURIComponent(query)));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    allCandidates = (data.candidates || []).sort(function(a,b){
      var order = {good:0, borderline:1, bad:2};
      var av = order[a.verdict] !== undefined ? order[a.verdict] : (a.match ? 0 : 2);
      var bv = order[b.verdict] !== undefined ? order[b.verdict] : (b.match ? 0 : 2);
      if (av !== bv) return av - bv;
      return (b.score||0) - (a.score||0);
    });

    var good = allCandidates.filter(function(c){ return c.verdict==='good'||c.match===true; }).length;
    var acceptable = allCandidates.filter(function(c){ return c.verdict==='borderline'; }).length;
    var bad = allCandidates.filter(function(c){ return c.verdict==='bad'||(c.match===false&&c.verdict!=='borderline'); }).length;

    document.getElementById('stats').innerHTML =
      '<div class="stat"><div class="stat-val" style="color:#34d399">' + good + '</div><div class="stat-lbl">Good fits</div></div>' +
      '<div class="stat"><div class="stat-val" style="color:#fbbf24">' + acceptable + '</div><div class="stat-lbl">Acceptable</div></div>' +
      '<div class="stat"><div class="stat-val" style="color:#f87171">' + bad + '</div><div class="stat-lbl">Not a fit</div></div>' +
      '<div class="stat"><div class="stat-val">' + allCandidates.length + '</div><div class="stat-lbl">Total</div></div>';

    // Fetch reviews for this query
    var reviewRes = await fetch('/api/dashboard');
    if (reviewRes.ok) {
      var dashData = await reviewRes.json();
      var reviews = (dashData.reviews||[]).filter(function(r){ return r.query === decodeURIComponent(query); });
      if (reviews.length) {
        var rHtml = '<div class="review-box"><div class="review-box-title">Team Reviews</div>';
        reviews.forEach(function(r) {
          var d = r.human_reviewed_at ? new Date(r.human_reviewed_at) : null;
          var dateStr = d ? (String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(2)) : '—';
          rHtml += '<div class="review-entry"><div class="review-meta">' + (r.human_reviewed_by||'anonymous') + ' · ' + dateStr + '</div>' +
            '<div class="review-text">' + (r.human_review||'') + '</div></div>';
        });
        rHtml += '</div>';
        document.getElementById('review-box').innerHTML = rHtml;
      }
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = '';
    renderList();

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').textContent = 'Error: ' + e.message;
    document.getElementById('error').style.display = 'block';
  }
});
</script>
</body>
</html>
