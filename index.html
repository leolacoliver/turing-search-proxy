<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

if (sessionStorage.getItem("turing_auth") !== "true") {
  window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.pathname);
}

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing · Search Tester</title>
<style>
:root{--bg:#08090f;--bg2:#0f1220;--bg3:#161b2e;--border:#1e2a42;--blue:#2563eb;--blue2:#3b82f6;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:#fff;border-bottom:3px solid var(--blue);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:100;}
.nav-left{display:flex;align-items:center;gap:16px;}
.nav-badge{font-size:11px;background:#eff6ff;color:var(--blue);padding:3px 10px;border-radius:99px;font-weight:600;}
nav a{font-size:13px;color:#374151;text-decoration:none;}
nav a:hover{color:var(--blue);}
.page{max-width:960px;margin:0 auto;padding:2rem 1.5rem;}
.page-title{font-size:22px;font-weight:700;margin-bottom:3px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem;}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:1rem;}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
textarea,input,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg3);color:var(--text);outline:none;}
textarea:focus,input:focus,select:focus{border-color:var(--blue);}
textarea{resize:vertical;font-family:monospace;}
select option{background:var(--bg3);}
.row{display:grid;grid-template-columns:1fr 150px;gap:12px;}
.field{margin-bottom:10px;}
.btn{padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.btn:hover{background:var(--blue2);}
.btn:disabled{background:var(--text3);cursor:not-allowed;}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge.neutral{background:var(--bg3);color:var(--text2);}
.badge.info{background:rgba(37,99,235,.15);color:var(--blue2);}
.badge.warning{background:rgba(245,158,11,.15);color:#fbbf24;}
.badge.success{background:rgba(16,185,129,.15);color:#34d399;}
.badge.danger{background:rgba(239,68,68,.15);color:#f87171;}
.summary-table{width:100%;border-collapse:collapse;font-size:13px;}
.summary-table th{text-align:left;font-size:10px;color:var(--text3);font-weight:600;padding:0 10px 8px 0;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;}
.summary-table td{padding:10px 10px 10px 0;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.summary-table tr:last-child td{border-bottom:none;}
.bar-wrap{background:var(--border);border-radius:99px;height:5px;min-width:80px;display:inline-block;width:100%;}
.bar{border-radius:99px;height:5px;}
.bar.green{background:var(--green);}
.bar.blue{background:var(--blue);}
.query-panels{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.query-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.qph{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none;}
.qph:hover{background:var(--bg3);}
.qpt{font-size:13px;font-weight:500;flex:1;min-width:0;word-break:break-word;}
.qpb{display:none;padding:12px 16px;}
.qpb.open{display:block;}
.mini-log{font-family:monospace;font-size:10px;color:var(--text3);max-height:80px;overflow-y:auto;margin-bottom:10px;background:var(--bg);padding:6px 8px;border-radius:6px;border:1px solid var(--border);}
.profiles-mini{max-height:400px;overflow-y:auto;}
.pc{border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid var(--border);background:var(--bg3);}
.pc.fit{border-color:var(--green);background:rgba(16,185,129,.05);}
.pc.borderline{border-color:var(--yellow);background:rgba(245,158,11,.04);}
.pch{display:flex;align-items:center;gap:8px;}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.av.pending{background:var(--bg);color:var(--text3);}
.av.fit{background:rgba(16,185,129,.2);color:#34d399;}
.av.borderline{background:rgba(245,158,11,.2);color:#fbbf24;}
.av.nofit{background:rgba(239,68,68,.2);color:#f87171;}
.pn{font-weight:500;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.ps{font-size:11px;color:var(--text3);margin-top:2px;}
.rb{margin-top:7px;padding:7px 10px;border-radius:6px;font-size:11px;line-height:1.5;}
.rb.fit{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2);}
.rb.borderline{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2);}
.rb.nofit{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15);}
.rbl{font-weight:700;margin-bottom:2px;}
.review-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.review-section label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;color:var(--text3);margin-bottom:6px;}
.review-section textarea{min-height:60px;max-height:200px;font-family:inherit;font-size:12px;}
.review-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.review-row input{width:140px;font-size:12px;padding:6px 10px;}
.review-btn{padding:6px 14px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.review-btn:hover{background:var(--blue2);}
.review-btn:disabled{background:var(--text3);cursor:not-allowed;}
.saved-msg{font-size:11px;color:#34d399;display:none;}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;}
.run-id-box{font-size:11px;color:var(--text3);margin-top:8px;font-family:monospace;}
#status-bar{display:flex;align-items:center;gap:10px;margin-top:12px;}
.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin:1.25rem 0 .75rem;}
</style>
</head>

    </a>
    <span class="nav-badge">Search Tester</span>
  </div>
  <div style="display:flex;gap:16px;">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/compare.html">LLM Comparison →</a>
  </div>
  <button onclick="sessionStorage.removeItem('turing_auth');window.location.href='/login.html'" style="font-size:12px;padding:5px 12px;background:transparent;border:1px solid #ddd;border-radius:6px;cursor:pointer;color:#666;">Logout</button>

<div class="page">
  <div class="page-title">Search Tester</div>
  <div class="page-sub">Run queries against the Turing talent API and evaluate profile fits with an LLM.</div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label>Search Queries — one per line (up to 200)</label>
        <textarea id="queries" rows="7" placeholder="python 5+ years&#10;react senior developer&#10;django backend 3+ years"></textarea>
      </div>
      <div class="field">
        <label>Page Size</label>
        <select id="pageSize" onchange="updateEstimate()">
          <option value="36">36</option>
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="500">500 (extended)</option>
        </select>
        <div id="time-estimate" style="font-size:11px;color:var(--yellow);margin-top:6px;display:none">
          ⚠️ ~12 min per query at 500 results
        </div>
      </div>
    </div>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div id="status-bar">
      <button class="btn" id="run-btn" onclick="runAll()">Run all queries</button>
      <span id="status-badge" class="badge neutral">idle</span>
    </div>
    <div id="run-id-box" class="run-id-box" style="display:none"></div>
  </div>

  <div id="summary-card" class="card" style="display:none">
    <div class="card-title">Results summary</div>
    <table class="summary-table">
      <thead>
        <tr>
          <th>Query</th><th>Domain</th><th>Subdomain</th><th>Status</th>
          <th>Fetched</th><th>Good / Borderline</th><th>Match rate</th><th>Progress</th><th></th>
        </tr>
      </thead>
      <tbody id="summary-tbody"></tbody>
    </table>
  </div>

  <div id="panels-section" style="display:none">
    <div class="section-label">Per-query details</div>
    <div class="query-panels" id="query-panels"></div>
  </div>
</div>

<script>
var PROXY = window.location.origin;
var state = {};

function extractSkills(p) {
  var raw = p.skills || p.topSkills || p.primarySkills || [];
  return raw.map(function(s) {
    if (typeof s === 'string') return s;
    if (s && typeof s === 'object') return s.name || s.skill || s.title || '';
    return String(s);
  }).filter(Boolean).slice(0, 8).join(', ') || '-';
}

function qid(q) {
  var n = 0;
  for (var i = 0; i < q.length; i++) n += q.charCodeAt(i);
  return 'q' + n + q.length;
}

function setGlobalStatus(s) {
  var labels = { idle: 'idle', running: 'running...', done: 'all done' };
  var classes = { idle: 'neutral', running: 'info', done: 'success' };
  var b = document.getElementById('status-badge');
  b.textContent = labels[s] || s;
  b.className = 'badge ' + (classes[s] || 'neutral');
  document.getElementById('run-btn').disabled = s === 'running';
}

function showError(msg) {
  var el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function updateSummaryRow(query) {
  var s = state[query];
  var row = document.getElementById('row-' + qid(query));
  if (!row) return;
  var total = s.profiles.length;
  var evKeys = Object.keys(s.evaluations);
  var evDone = evKeys.length;
  var goodCount = evKeys.filter(function(k) { return s.evaluations[k].match; }).length;
  var borderlineCount = evKeys.filter(function(k) { return s.evaluations[k].borderline; }).length;
  var isDone = s.status === 'done' || s.status === 'error';
  var progressPct = 0;
  if (isDone && total > 0) progressPct = Math.round(goodCount / total * 100);
  else if (total > 0) progressPct = Math.round(evDone / total * 100);
  var matchPct = total > 0 ? Math.round(goodCount / total * 100) : 0;
  var cls = s.status === 'done' ? 'success' : s.status === 'error' ? 'danger' : s.status === 'evaluating' ? 'warning' : 'info';
  var barCls = isDone ? 'green' : 'blue';
  var detailBtn = '<button onclick="togglePanel(\'' + qid(query) + '\')" style="font-size:11px;padding:2px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;cursor:pointer;color:var(--text2)">details</button>';
  row.innerHTML =
    '<td style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + query + '</td>' +
    '<td style="font-size:12px;color:var(--text2)">' + (s.domain || '-') + '</td>' +
    '<td style="font-size:12px;color:var(--text2)">' + (s.subdomain || '-') + '</td>' +
    '<td><span class="badge ' + cls + '">' + s.status + '</span></td>' +
    '<td>' + (total || '-') + '</td>' +
    '<td>' + (isDone ? '<span style="color:#34d399">' + goodCount + '</span>' + (borderlineCount > 0 ? ' + <span style="color:#fbbf24">' + borderlineCount + '~</span>' : '') + '/' + total : evDone > 0 ? goodCount + ' so far' : '-') + '</td>' +
    '<td>' + (isDone || evDone > 0 ? matchPct + '%' : '-') + '</td>' +
    '<td style="min-width:100px"><div class="bar-wrap"><div class="bar ' + barCls + '" style="width:' + progressPct + '%"></div></div></td>' +
    '<td>' + detailBtn + '</td>';
}

function updatePanel(query) {
  var s = state[query];
  var id = qid(query);
  var panel = document.getElementById('panel-' + id);
  if (!panel) return;
  var evKeys = Object.keys(s.evaluations);
  var goodCount = evKeys.filter(function(k) { return s.evaluations[k].match; }).length;
  var total = s.profiles.length;
  var hdr = panel.querySelector('.panel-badge');
  if (hdr) {
    hdr.textContent = s.status === 'done' ? goodCount + '/' + total + ' fits' : s.status;
    hdr.className = 'badge ' + (s.status === 'done' ? 'success' : s.status === 'error' ? 'danger' : 'info');
  }
  var logEl = panel.querySelector('.mini-log');
  if (logEl) { logEl.innerHTML = s.logs.map(function(l) { return '<div>' + l + '</div>'; }).join(''); logEl.scrollTop = logEl.scrollHeight; }
  var profilesEl = panel.querySelector('.profiles-mini');
  if (!profilesEl) return;
  profilesEl.innerHTML = s.profiles.slice(0, 100).map(function(p, i) {
    var ev = s.evaluations[i];
    var fit = ev && ev.match;
    var pending = ev === undefined;
    var name = p.name || ((p.firstName || '') + ' ' + (p.lastName || '')).trim() || 'Unknown';
    var skills = extractSkills(p);
    var verdict = ev ? (ev.verdict || (fit ? 'good' : 'bad')) : null;
    var isBorderline = ev && ev.borderline;
    var avCls = pending ? 'pending' : fit ? 'fit' : isBorderline ? 'borderline' : 'nofit';
    var pcCls = pending ? '' : fit ? 'fit' : isBorderline ? 'borderline' : '';
    var profileLink = p.id ? '<a href="https://matching.turing.com/developer/' + p.id + '" target="_blank" style="font-size:10px;color:var(--blue2);text-decoration:none;margin-left:6px">profile ↗</a>' : '';
    var reasonHtml = '';
    if (ev && ev.reason) {
      var rbCls = fit ? 'fit' : isBorderline ? 'borderline' : 'nofit';
      var rbLabel = fit ? 'Why fit' : isBorderline ? 'Borderline' : 'Why not fit';
      var scoreHtml = ev.score ? ' <span style="opacity:.7;font-size:10px">(' + ev.score + '%)</span>' : '';
      reasonHtml = '<div class="rb ' + rbCls + '"><div class="rbl">' + rbLabel + scoreHtml + '</div>' + ev.reason + '</div>';
    }
    return '<div class="pc ' + pcCls + '">' +
      '<div class="pch">' +
        '<div class="av ' + avCls + '">' + (i + 1) + '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="display:flex;align-items:center"><div class="pn">' + name + '</div>' + profileLink + '</div>' +
          '<div class="ps">' + skills + '</div>' +
        '</div>' +
        '<span class="badge ' + (pending ? 'neutral' : fit ? 'success' : isBorderline ? 'warning' : 'danger') + '">' + (pending ? '...' : fit ? 'fit' : isBorderline ? 'borderline' : 'no fit') + '</span>' +
      '</div>' + reasonHtml + '</div>';
  }).join('');
}

function togglePanel(id) {
  var body = document.querySelector('#panel-' + id + ' .qpb');
  if (body) body.classList.toggle('open');
}

function showReviewSection(id) {
  var el = document.getElementById('review-' + id);
  if (el) el.style.display = 'block';
}

function submitReview(id) {
  var query = Object.keys(state).find(function(q) { return qid(q) === id; });
  if (!query) { alert('Query not found'); return; }
  var s = state[query];
  var reviewText = document.getElementById('review-text-' + id).value.trim();
  var reviewerName = document.getElementById('reviewer-name-' + id).value.trim() || 'anonymous';
  var btn = document.getElementById('review-btn-' + id);
  var savedMsg = document.getElementById('review-saved-' + id);
  if (!reviewText) { alert('Please add a review before submitting.'); return; }
  btn.disabled = true;
  btn.textContent = 'Saving...';
  fetch(PROXY + '/api/review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ runId: s.runId, query: query, review: reviewText, reviewedBy: reviewerName })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.ok) {
      btn.textContent = 'Submitted';
      savedMsg.style.display = 'inline';
    } else {
      btn.disabled = false;
      btn.textContent = 'Submit review';
      alert('Error: ' + (data.error || 'unknown'));
    }
  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = 'Submit review';
    alert('Error: ' + e.message);
  });
}

function initUI(queries) {
  var tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = '';
  queries.forEach(function(q) {
    var tr = document.createElement('tr');
    tr.id = 'row-' + qid(q);
    tbody.appendChild(tr);
  });
  document.getElementById('summary-card').style.display = '';
  var panelsEl = document.getElementById('query-panels');
  panelsEl.innerHTML = '';
  queries.forEach(function(q) {
    var id = qid(q);
    var div = document.createElement('div');
    div.className = 'query-panel';
    div.id = 'panel-' + id;
    // Build panel HTML safely without inline event string escaping issues
    var header = document.createElement('div');
    header.className = 'qph';
    header.addEventListener('click', (function(pid) { return function() { togglePanel(pid); }; })(id));
    var titleSpan = document.createElement('span');
    titleSpan.className = 'qpt';
    titleSpan.textContent = q;
    var badgeSpan = document.createElement('span');
    badgeSpan.className = 'badge info panel-badge';
    badgeSpan.textContent = 'queued';
    header.appendChild(titleSpan);
    header.appendChild(badgeSpan);
    var body = document.createElement('div');
    body.className = 'qpb';
    var miniLog = document.createElement('div');
    miniLog.className = 'mini-log';
    var profilesMini = document.createElement('div');
    profilesMini.className = 'profiles-mini';
    // Review section
    var reviewSection = document.createElement('div');
    reviewSection.className = 'review-section';
    reviewSection.id = 'review-' + id;
    reviewSection.style.display = 'none';
    reviewSection.innerHTML =
      '<label>Human Review</label>' +
      '<textarea id="review-text-' + id + '" placeholder="Add your observations about these LLM results..."></textarea>' +
      '<div class="review-row">' +
        '<input id="reviewer-name-' + id + '" placeholder="Your name" />' +
        '<button class="review-btn" id="review-btn-' + id + '">Submit review</button>' +
        '<span class="saved-msg" id="review-saved-' + id + '">Saved!</span>' +
      '</div>';
    // Wire up review button after DOM insert
    body.appendChild(miniLog);
    body.appendChild(profilesMini);
    body.appendChild(reviewSection);
    div.appendChild(header);
    div.appendChild(body);
    panelsEl.appendChild(div);
    // Add click handler for review button
    document.getElementById('review-btn-' + id).addEventListener('click', (function(pid) {
      return function() { submitReview(pid); };
    })(id));
  });
  document.getElementById('panels-section').style.display = '';
}

async function runQuery(query, pageSize, runId) {
  var s = state[query];
  s.status = 'searching'; s.logs = []; s.domain = null; s.subdomain = null;

  function log(msg) {
    var t = new Date().toLocaleTimeString();
    s.logs.push('[' + t + '] ' + msg);
    updatePanel(query); updateSummaryRow(query);
  }

  log('Searching "' + query + '"...');
  try {
    var params = new URLSearchParams({ query: query, pageSize: pageSize, page: '1' });
    var res = await fetch(PROXY + '/api/search?' + params);
    if (!res.ok) { var txt = await res.text(); throw new Error('HTTP ' + res.status + ': ' + txt.slice(0, 200)); }
    var data = await res.json();
    if (data.error) throw new Error(data.error);
    s.profiles = data.results || data.talents || data.data || [];
    log('Got ' + s.profiles.length + ' profiles.');
    updatePanel(query); updateSummaryRow(query);
    if (!s.profiles.length) { s.status = 'done'; updateSummaryRow(query); updatePanel(query); return; }
  } catch (e) {
    s.status = 'error'; log('Search error: ' + e.message);
    updateSummaryRow(query); updatePanel(query); return;
  }

  s.status = 'evaluating';
  log('Evaluating ' + Math.min(s.profiles.length, 100) + ' profiles...');
  updateSummaryRow(query);

  var toEval = s.profiles.slice(0, 500);
  var BATCH = 10, totalBatches = Math.ceil(toEval.length / BATCH);
  var MAX_RETRIES = 4, PAUSE_MS = 1500;

  for (var i = 0; i < toEval.length; i += BATCH) {
    var batch = toEval.slice(i, i + BATCH).map(function(p, j) { return Object.assign({}, p, { _idx: i + j }); });
    var batchNum = Math.floor(i / BATCH) + 1;
    for (var attempt = 1; attempt <= MAX_RETRIES; attempt++) {
      try {
        var res2 = await fetch(PROXY + '/api/evaluate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: query, profiles: batch, runId: runId })
        });
        var data2 = await res2.json();
        if (!res2.ok || !data2.results) throw new Error('API error: ' + (data2.error || res2.status));
        if (data2.results.length < batch.length) throw new Error('Incomplete: got ' + data2.results.length + ' of ' + batch.length);
        if (data2.query_domain && !s.domain) { s.domain = data2.query_domain; s.subdomain = data2.query_subdomain || null; }
        data2.results.forEach(function(item) { s.evaluations[item.index] = { match: item.match, borderline: item.borderline, verdict: item.verdict || 'bad', score: item.score || 0, reason: item.reason }; });
        var good = Object.keys(s.evaluations).filter(function(k) { return s.evaluations[k].match; }).length;
        var borderline = Object.keys(s.evaluations).filter(function(k) { return s.evaluations[k].borderline; }).length;
        log('Batch ' + batchNum + '/' + totalBatches + ' OK - ' + good + ' fits so far.');
        updatePanel(query); updateSummaryRow(query);
        break;
      } catch (e) {
        var waitMs = PAUSE_MS * attempt;
        if (attempt < MAX_RETRIES) {
          log('Batch ' + batchNum + ' attempt ' + attempt + ' failed - retrying in ' + (waitMs / 1000) + 's...');
          await new Promise(function(r) { setTimeout(r, waitMs); });
        } else {
          log('Batch ' + batchNum + ' FAILED after ' + MAX_RETRIES + ' attempts: ' + e.message);
        }
      }
    }
    if (i + BATCH < toEval.length) await new Promise(function(r) { setTimeout(r, PAUSE_MS); });
  }

  var evKeys = Object.keys(s.evaluations);
  var good = evKeys.filter(function(k) { return s.evaluations[k].match; }).length;
  var total = toEval.length;
  var matchRate = total > 0 ? Math.round(good / total * 100) : 0;
  s.status = 'done';
  log('Done. ' + good + '/' + total + ' good fits.');
  updatePanel(query); updateSummaryRow(query);
  showReviewSection(qid(query));

  try {
    var res3 = await fetch(PROXY + '/api/runs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ runId: runId, query: query, queryDomain: s.domain, querySubdomain: s.subdomain, totalResults: total, goodFits: good, borderlineFits: Object.keys(s.evaluations).filter(function(k){return s.evaluations[k].borderline;}).length, matchRate: matchRate })
    });
    var data3 = await res3.json();
    if (data3.ok) log('Saved to Supabase.');
    else log('Supabase warning: ' + JSON.stringify(data3));
  } catch (e) { log('Warning: could not save: ' + e.message); }
}

function updateEstimate() {
  var ps = parseInt(document.getElementById('pageSize').value);
  var el = document.getElementById('time-estimate');
  if (ps >= 500) {
    var queries = (document.getElementById('queries').value.trim().split('\n').filter(Boolean).length) || 1;
    var mins = Math.round(queries * 12);
    el.textContent = '⚠️ ~' + mins + ' min estimated (' + queries + ' quer' + (queries>1?'ies':'y') + ' × ~12 min each at 500 results)';
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

async function runAll() {
  var rawQueries = document.getElementById('queries').value.trim();
  var pageSize = document.getElementById('pageSize').value;
  showError('');
  if (!rawQueries) { showError('At least one query is required.'); return; }
  var queries = rawQueries.split('\n').map(function(q) { return q.trim(); }).filter(Boolean).slice(0, 200);
  if (!queries.length) { showError('No valid queries found.'); return; }
  var runId = 'run_' + Date.now();
  var box = document.getElementById('run-id-box');
  box.textContent = 'Run ID: ' + runId;
  box.style.display = '';
  queries.forEach(function(q) {
    state[q] = { status: 'queued', profiles: [], evaluations: {}, logs: [], domain: null, subdomain: null, runId: runId };
  });
  initUI(queries);
  setGlobalStatus('running');
  queries.forEach(function(q) { updateSummaryRow(q); updatePanel(q); });
  // Run queries sequentially with 2s delay to avoid overwhelming the search API
  for (var qi = 0; qi < queries.length; qi++) {
    await runQuery(queries[qi], pageSize, runId);
    if (qi < queries.length - 1) {
      await new Promise(function(r) { setTimeout(r, 10000); });
    }
  }
  setGlobalStatus('done');
}
