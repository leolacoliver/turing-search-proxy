<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing Search Tester</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  input, textarea, select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff; }
  textarea { resize: vertical; font-family: monospace; }
  .row { display: grid; grid-template-columns: 1fr 140px; gap: 12px; margin-top: 10px; }
  .field { margin-bottom: 10px; }
  button { padding: 9px 20px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  button:disabled { background: #999; cursor: not-allowed; }
  .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .badge.neutral { background: #f0f0f0; color: #666; }
  .badge.info { background: #e8f0fe; color: #1a56cc; }
  .badge.warning { background: #fef3cd; color: #856404; }
  .badge.success { background: #d4edda; color: #155724; }
  .badge.danger { background: #f8d7da; color: #721c24; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: #f8f8f8; border-radius: 8px; padding: 10px 14px; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-value.small { font-size: 13px; word-break: break-all; }
  .tabs { display: flex; border-bottom: 1px solid #e0e0e0; margin-bottom: 1rem; }
  .tab { padding: 10px 18px; font-size: 13px; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; color: #666; }
  .tab.active { border-bottom-color: #111; color: #111; font-weight: 500; }
  .profiles-list { max-height: 500px; overflow-y: auto; }
  .profile { border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; }
  .profile.fit { border-color: #28a745; }
  .profile.nofit { border-color: #e0e0e0; }
  .profile-header { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .avatar.pending { background: #f0f0f0; color: #666; }
  .avatar.fit { background: #d4edda; color: #155724; }
  .avatar.nofit { background: #f8d7da; color: #721c24; }
  .profile-name { font-weight: 500; font-size: 13px; }
  .profile-title { font-size: 12px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-details { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; font-size: 12px; color: #666; display: none; line-height: 1.8; }
  .profile-details.open { display: block; }
  .toggle-btn { font-size: 11px; padding: 2px 8px; background: transparent; color: #666; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; flex-shrink: 0; }
  .log-box { font-family: monospace; font-size: 11px; color: #555; max-height: 300px; overflow-y: auto; }
  .log-box div { padding: 1px 0; }
  .error-box { background: #f8d7da; color: #721c24; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
  .history-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 12px; }
  .history-row:last-child { border-bottom: none; }
  .flex-center { display: flex; align-items: center; gap: 8px; }
  #status-bar { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>Turing Search Tester</h1>
  <p class="subtitle">Run search queries against the Turing API and evaluate profile fits with an LLM.</p>

  <div class="card">
    <div class="field">
      <label>JWT Token</label>
      <textarea id="token" rows="3" placeholder="Paste your Bearer token here (without 'Bearer ')…"></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label>Search Query</label>
        <input id="query" type="text" value="python 5+ years">
      </div>
      <div class="field">
        <label>Page Size</label>
        <select id="pageSize">
          <option value="36">36</option>
          <option value="50">50</option>
          <option value="100" selected>100</option>
        </select>
      </div>
    </div>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div id="status-bar">
      <button id="run-btn" onclick="run()">Run search + evaluate</button>
      <span id="status-badge" class="badge neutral">idle</span>
    </div>
  </div>

  <div id="metrics" class="metrics" style="display:none"></div>

  <div id="history-card" class="card" style="display:none">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">Run history</div>
    <div id="history-list"></div>
  </div>

  <div id="results-card" class="card" style="display:none">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('profiles')">Profiles</button>
      <button class="tab" onclick="switchTab('log')">Log</button>
    </div>
    <div id="tab-profiles">
      <div class="profiles-list" id="profiles-list"></div>
    </div>
    <div id="tab-log" style="display:none">
      <div class="log-box" id="log-list"></div>
    </div>
  </div>
</div>

<script>
const PROXY = window.location.origin;
let profiles = [];
let evaluations = {};
let history = [];

function extractSkills(p) {
  const raw = p.skills || p.topSkills || p.primarySkills || [];
  return raw.map(s => {
    if (typeof s === 'string') return s;
    if (s && typeof s === 'object') return s.name || s.skill || s.title || '';
    return String(s);
  }).filter(Boolean).slice(0, 12).join(', ') || '—';
}

function setStatus(s) {
  const map = {
    idle:       { label: 'idle',                  cls: 'neutral' },
    running:    { label: 'searching…',            cls: 'info' },
    evaluating: { label: 'evaluating with LLM…', cls: 'warning' },
    done:       { label: 'done',                  cls: 'success' },
    error:      { label: 'error',                 cls: 'danger' },
  };
  const b = document.getElementById('status-badge');
  b.textContent = map[s].label;
  b.className = 'badge ' + map[s].cls;
  document.getElementById('run-btn').disabled = s === 'running' || s === 'evaluating';
}

function addLog(msg) {
  const t = new Date().toLocaleTimeString();
  const el = document.getElementById('log-list');
  const div = document.createElement('div');
  div.textContent = `[${t}] ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['profiles','log'][i] === tab));
  document.getElementById('tab-profiles').style.display = tab === 'profiles' ? '' : 'none';
  document.getElementById('tab-log').style.display = tab === 'log' ? '' : 'none';
}

function renderProfiles() {
  const list = document.getElementById('profiles-list');
  list.innerHTML = '';
  profiles.slice(0, 100).forEach((p, i) => {
    const ev = evaluations[i];
    const fit = ev?.match;
    const pending = ev === undefined;
    const name = p.name || ((p.firstName||'') + ' ' + (p.lastName||'')).trim() || 'Unknown';
    const skills = extractSkills(p);
    const exp = p.totalExperience || p.yearsOfExperience || '?';
    const title = p.title || p.designation || '—';

    const div = document.createElement('div');
    div.className = 'profile' + (pending ? '' : fit ? ' fit' : ' nofit');
    div.innerHTML = `
      <div class="profile-header">
        <div class="avatar ${pending ? 'pending' : fit ? 'fit' : 'nofit'}">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div class="profile-name">${name}</div>
          <div class="profile-title">${title}</div>
        </div>
        <span class="badge ${pending ? 'neutral' : fit ? 'success' : 'danger'}">${pending ? 'pending' : fit ? 'fit' : 'no fit'}</span>
        <button class="toggle-btn" onclick="
          var d=this.parentElement.parentElement.querySelector('.profile-details');
          d.classList.toggle('open');
          this.textContent=d.classList.contains('open')?'▲':'▼';
        ">▼</button>
      </div>
      <div class="profile-details">
        <div><strong>Skills:</strong> ${skills}</div>
        <div><strong>Experience:</strong> ${exp} yrs</div>
        ${ev?.reason ? `<div><strong>LLM:</strong> <em>${ev.reason}</em></div>` : ''}
      </div>
    `;
    list.appendChild(div);
  });
}

function renderMetrics(summary) {
  const el = document.getElementById('metrics');
  el.style.display = 'grid';
  el.innerHTML = [
    { label: 'query', value: summary.query, small: true },
    { label: 'profiles evaluated', value: summary.total },
    { label: 'good fits', value: `${summary.goodCount}/${summary.total}` },
    { label: 'match rate', value: `${Math.round(summary.goodCount/summary.total*100)}%` },
  ].map(m => `
    <div class="metric">
      <div class="metric-label">${m.label}</div>
      <div class="metric-value ${m.small?'small':''}">${m.value}</div>
    </div>
  `).join('');
}

function renderHistory() {
  const card = document.getElementById('history-card');
  if (!history.length) { card.style.display='none'; return; }
  card.style.display = '';
  document.getElementById('history-list').innerHTML = history.map(h => `
    <div class="history-row">
      <span style="font-weight:500">${h.query}</span>
      <div class="flex-center">
        <span class="badge success">${h.goodCount}/${h.total} fits</span>
        <span style="color:#888">${new Date(h.timestamp).toLocaleTimeString()}</span>
      </div>
    </div>
  `).join('');
}

async function run() {
  const token = document.getElementById('token').value.trim();
  const query = document.getElementById('query').value.trim();
  const pageSize = document.getElementById('pageSize').value;

  showError('');
  if (!token) { showError('JWT token is required.'); return; }
  if (!query)  { showError('Query is required.'); return; }

  // Reset state
  profiles = [];
  evaluations = {};
  document.getElementById('log-list').innerHTML = '';
  document.getElementById('profiles-list').innerHTML = '';
  document.getElementById('metrics').style.display = 'none';
  document.getElementById('results-card').style.display = '';
  setStatus('running');
  addLog(`Searching: "${query}" (pageSize=${pageSize})`);

  // 1. Search
  try {
    const params = new URLSearchParams({ token, query, pageSize, page: '1' });
    const res = await fetch(`${PROXY}/api/search?${params}`);
    if (!res.ok) { const t = await res.text(); throw new Error(`HTTP ${res.status}: ${t.slice(0,200)}`); }
    const data = await res.json();
    profiles = data?.results || data?.talents || data?.data || [];
    addLog(`Got ${profiles.length} profiles.`);
    renderProfiles();
    if (!profiles.length) { addLog('No results.'); setStatus('done'); return; }
  } catch(e) {
    showError(e.message); addLog(`Search error: ${e.message}`); setStatus('error'); return;
  }

  // 2. Evaluate
  setStatus('evaluating');
  addLog('Evaluating up to 100 profiles with LLM…');

  const toEval = profiles.slice(0, 100);
  let goodCount = 0;
  const BATCH = 10;

  for (let i = 0; i < toEval.length; i += BATCH) {
    const batch = toEval.slice(i, i + BATCH).map((p, j) => ({ ...p, _idx: i + j }));
    try {
      const res = await fetch(`${PROXY}/api/evaluate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, profiles: batch }),
      });
      const data = await res.json();
      for (const item of (data.results || [])) {
        evaluations[item.index] = { match: item.match, reason: item.reason };
        if (item.match) goodCount++;
      }
      renderProfiles();
      addLog(`Batch ${Math.floor(i/BATCH)+1}/${Math.ceil(toEval.length/BATCH)} done — ${goodCount} good fits so far.`);
    } catch(e) {
      addLog(`LLM batch error: ${e.message}`);
    }
  }

  const summary = { query, total: toEval.length, goodCount, timestamp: new Date().toISOString() };
  history.unshift(summary);
  renderMetrics(summary);
  renderHistory();
  addLog(`Done. ${goodCount}/${toEval.length} good fits for "${query}".`);
  setStatus('done');
}
</script>
</body>
</html>
