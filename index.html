<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing Search Tester</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  input, textarea, select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff; }
  textarea { resize: vertical; font-family: monospace; }
  .row { display: grid; grid-template-columns: 1fr 140px; gap: 12px; }
  .field { margin-bottom: 10px; }
  button { padding: 9px 20px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  button:disabled { background: #999; cursor: not-allowed; }
  .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge.neutral { background: #f0f0f0; color: #666; }
  .badge.info    { background: #e8f0fe; color: #1a56cc; }
  .badge.warning { background: #fef3cd; color: #856404; }
  .badge.success { background: #d4edda; color: #155724; }
  .badge.danger  { background: #f8d7da; color: #721c24; }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .summary-table th { text-align: left; font-size: 11px; color: #888; font-weight: 500; padding: 0 12px 8px 0; border-bottom: 1px solid #eee; }
  .summary-table td { padding: 10px 12px 10px 0; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  .summary-table tr:last-child td { border-bottom: none; }
  .progress-bar-wrap { background: #f0f0f0; border-radius: 99px; height: 6px; width: 100%; min-width: 80px; }
  .progress-bar { background: #28a745; border-radius: 99px; height: 6px; transition: width 0.3s; }
  .progress-bar.running { background: #1a56cc; }
  .query-panels { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .query-panel { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
  .query-panel-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; user-select: none; }
  .query-panel-header:hover { background: #fafafa; }
  .query-panel-title { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .query-panel-body { display: none; padding: 12px 16px; }
  .query-panel-body.open { display: block; }
  .mini-log { font-family: monospace; font-size: 10px; color: #888; max-height: 80px; overflow-y: auto; margin-bottom: 10px; background: #f8f8f8; padding: 6px 8px; border-radius: 6px; }
  .profiles-mini { max-height: 400px; overflow-y: auto; }
  .profile-card { border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; border: 1px solid #e0e0e0; }
  .profile-card.fit   { border-color: #28a745; background: #f6fff8; }
  .profile-card.nofit { border-color: #e0e0e0; background: #fff; }
  .profile-card-header { display: flex; align-items: center; gap: 8px; }
  .avatar-mini { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .avatar-mini.pending { background: #f0f0f0; color: #888; }
  .avatar-mini.fit    { background: #d4edda; color: #155724; }
  .avatar-mini.nofit  { background: #f8d7da; color: #721c24; }
  .profile-name { font-weight: 500; font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-skills { font-size: 11px; color: #888; margin-top: 2px; }
  .reason-box { margin-top: 7px; padding: 6px 10px; border-radius: 6px; font-size: 11px; line-height: 1.5; }
  .reason-box.fit   { background: #d4edda; color: #155724; }
  .reason-box.nofit { background: #f8d7da; color: #721c24; }
  .reason-label { font-weight: 600; margin-bottom: 2px; }
  .error-box { background: #f8d7da; color: #721c24; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
  #status-bar { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .run-id-box { font-size: 11px; color: #888; margin-top: 8px; font-family: monospace; }
</style>
</head>
<body>
<div class="container">
  <h1>Turing Search Tester</h1>
  <p class="subtitle">Run multiple search queries in parallel and evaluate profile fits with an LLM.</p>

  <div class="card">
    <div class="field">
      <label>JWT Token</label>
      <textarea id="token" rows="3" placeholder="Paste your Bearer token here (without 'Bearer ')..."></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label>Search Queries - one per line (up to 10)</label>
        <textarea id="queries" rows="6" placeholder="python 5+ years&#10;react senior developer&#10;django backend 3+ years"></textarea>
      </div>
      <div class="field">
        <label>Page Size</label>
        <select id="pageSize">
          <option value="36">36</option>
          <option value="50">50</option>
          <option value="100" selected>100</option>
        </select>
      </div>
    </div>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div id="status-bar">
      <button id="run-btn" onclick="runAll()">Run all queries</button>
      <span id="status-badge" class="badge neutral">idle</span>
    </div>
    <div id="run-id-box" class="run-id-box" style="display:none"></div>
  </div>

  <div id="summary-card" class="card" style="display:none">
    <div class="section-title">Results summary</div>
    <table class="summary-table">
      <thead>
        <tr>
          <th>Query</th>
          <th>Domain</th>
          <th>Subdomain</th>
          <th>Status</th>
          <th>Fetched</th>
          <th>Good fits</th>
          <th>Match rate</th>
          <th>Progress</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="summary-tbody"></tbody>
    </table>
  </div>

  <div id="panels-section" style="display:none">
    <div class="section-title">Per-query details</div>
    <div class="query-panels" id="query-panels"></div>
  </div>
</div>

<script>
const PROXY = window.location.origin;
const state = {};

function extractSkills(p) {
  const raw = p.skills || p.topSkills || p.primarySkills || [];
  return raw.map(function(s) {
    if (typeof s === 'string') return s;
    if (s && typeof s === 'object') return s.name || s.skill || s.title || '';
    return String(s);
  }).filter(Boolean).slice(0, 8).join(', ') || '-';
}

function qid(q) {
  return 'q' + Array.from(q).reduce(function(a,c){return a+c.charCodeAt(0);},0) + q.length;
}

function setGlobalStatus(s) {
  var map = { idle: ['idle','neutral'], running: ['running...','info'], done: ['all done','success'] };
  var m = map[s] || ['idle','neutral'];
  var b = document.getElementById('status-badge');
  b.textContent = m[0]; b.className = 'badge ' + m[1];
  document.getElementById('run-btn').disabled = s === 'running';
}

function showError(msg) {
  var el = document.getElementById('error-box');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

function updateSummaryRow(query) {
  var s = state[query];
  var row = document.getElementById('row-' + qid(query));
  if (!row) return;
  var total = s.profiles.length;
  var evDone = Object.keys(s.evaluations).length;
  var goodCount = Object.values(s.evaluations).filter(function(e){return e.match;}).length;
  var pct = total > 0 ? Math.round(goodCount / total * 100) : 0;
  var evPct = total > 0 ? Math.round(evDone / total * 100) : 0;
  var isDone = s.status === 'done' || s.status === 'error';
  var cls = s.status === 'done' ? 'success' : s.status === 'error' ? 'danger' : s.status === 'evaluating' ? 'warning' : 'info';
  var html = '<td style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + query + '</td>';
  html += '<td style="font-size:12px;color:#555">' + (s.domain || '-') + '</td>';
  html += '<td style="font-size:12px;color:#555">' + (s.subdomain || '-') + '</td>';
  html += '<td><span class="badge ' + cls + '">' + s.status + '</span></td>';
  html += '<td>' + (total || '-') + '</td>';
  html += '<td>' + (isDone ? goodCount+'/'+total : evDone > 0 ? goodCount+' so far' : '-') + '</td>';
  html += '<td>' + (isDone || evDone > 0 ? pct+'%' : '-') + '</td>';
  html += '<td style="min-width:100px"><div class="progress-bar-wrap"><div class="progress-bar ' + (!isDone?'running':'') + '" style="width:' + (isDone?pct:evPct) + '%"></div></div></td>';
  html += '<td><button onclick="togglePanel(\'' + query.replace(/'/g,"\\'") + '\')" style="padding:3px 10px;font-size:11px;background:#f0f0f0;color:#333;border:none;border-radius:6px;cursor:pointer">details</button></td>';
  row.innerHTML = html;
}

function updatePanel(query) {
  var s = state[query];
  var id = qid(query);
  var panel = document.getElementById('panel-' + id);
  if (!panel) return;

  var goodCount = Object.values(s.evaluations).filter(function(e){return e.match;}).length;
  var total = s.profiles.length;
  var hdr = panel.querySelector('.panel-badge');
  if (hdr) {
    hdr.textContent = s.status === 'done' ? goodCount+'/'+total+' fits' : s.status;
    hdr.className = 'badge ' + (s.status === 'done' ? 'success' : s.status === 'error' ? 'danger' : 'info');
  }

  var logEl = panel.querySelector('.mini-log');
  if (logEl) logEl.innerHTML = s.logs.map(function(l){return '<div>'+l+'</div>';}).join('');

  var profilesEl = panel.querySelector('.profiles-mini');
  if (!profilesEl) return;

  profilesEl.innerHTML = s.profiles.slice(0, 100).map(function(p, i) {
    var ev = s.evaluations[i];
    var fit = ev && ev.match;
    var pending = ev === undefined;
    var name = p.name || ((p.firstName||'') + ' ' + (p.lastName||'')).trim() || 'Unknown';
    var skills = extractSkills(p);
    var avatarCls = pending ? 'pending' : fit ? 'fit' : 'nofit';
    var cardCls = pending ? '' : fit ? 'fit' : 'nofit';
    var profileLink = p.id ? '<a href="https://matching.turing.com/developer/'+p.id+'" target="_blank" style="font-size:10px;color:#1a56cc;text-decoration:none;white-space:nowrap;flex-shrink:0">profile</a>' : '';
    var reasonHtml = '';
    if (ev && ev.reason) {
      reasonHtml = '<div class="reason-box ' + (fit?'fit':'nofit') + '"><div class="reason-label">' + (fit ? 'Why fit' : 'Why not fit') + '</div>' + ev.reason + '</div>';
    }
    return '<div class="profile-card ' + cardCls + '">' +
      '<div class="profile-card-header">' +
        '<div class="avatar-mini ' + avatarCls + '">' + (i+1) + '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="display:flex;align-items:center;gap:6px">' +
            '<div class="profile-name">' + name + '</div>' +
            profileLink +
          '</div>' +
          '<div class="profile-skills">' + skills + '</div>' +
        '</div>' +
        '<span class="badge ' + (pending?'neutral':fit?'success':'danger') + '">' + (pending?'...':fit?'fit':'no fit') + '</span>' +
      '</div>' +
      reasonHtml +
    '</div>';
  }).join('');
}

function togglePanel(query) {
  var body = document.querySelector('#panel-' + qid(query) + ' .query-panel-body');
  if (body) body.classList.toggle('open');
}

function initUI(queries) {
  var tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = '';
  queries.forEach(function(q) {
    var tr = document.createElement('tr');
    tr.id = 'row-' + qid(q);
    tbody.appendChild(tr);
  });
  document.getElementById('summary-card').style.display = '';

  var panelsEl = document.getElementById('query-panels');
  panelsEl.innerHTML = '';
  queries.forEach(function(q) {
    var div = document.createElement('div');
    div.className = 'query-panel';
    div.id = 'panel-' + qid(q);
    div.innerHTML = '<div class="query-panel-header" onclick="togglePanel(\'' + q.replace(/'/g,"\\'") + '\')">' +
      '<span class="query-panel-title">' + q + '</span>' +
      '<span class="badge info panel-badge">queued</span>' +
      '</div>' +
      '<div class="query-panel-body"><div class="mini-log"></div><div class="profiles-mini"></div></div>';
    panelsEl.appendChild(div);
  });
  document.getElementById('panels-section').style.display = '';
}

async function runQuery(query, token, pageSize, runId) {
  var s = state[query];
  s.status = 'searching';
  s.logs = [];
  s.domain = null;
  s.subdomain = null;

  function log(msg) {
    var t = new Date().toLocaleTimeString();
    s.logs.push('[' + t + '] ' + msg);
    updatePanel(query);
    updateSummaryRow(query);
  }

  log('Searching "' + query + '"...');

  try {
    var params = new URLSearchParams({ token: token, query: query, pageSize: pageSize, page: '1' });
    var res = await fetch(PROXY + '/api/search?' + params);
    if (!res.ok) { var t = await res.text(); throw new Error('HTTP ' + res.status + ': ' + t.slice(0,200)); }
    var data = await res.json();
    s.profiles = data.results || data.talents || data.data || [];
    log('Got ' + s.profiles.length + ' profiles.');
    updatePanel(query);
    updateSummaryRow(query);
    if (!s.profiles.length) { s.status = 'done'; updateSummaryRow(query); updatePanel(query); return; }
  } catch(e) {
    s.status = 'error'; log('Search error: ' + e.message);
    updateSummaryRow(query); updatePanel(query); return;
  }

  s.status = 'evaluating';
  log('Evaluating ' + Math.min(s.profiles.length, 100) + ' profiles...');
  updateSummaryRow(query);

  var toEval = s.profiles.slice(0, 100);
  var BATCH = 10;

  for (var i = 0; i < toEval.length; i += BATCH) {
    var batch = toEval.slice(i, i + BATCH).map(function(p, j) {
      return Object.assign({}, p, { _idx: i + j });
    });
    try {
      var res2 = await fetch(PROXY + '/api/evaluate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: query, profiles: batch, runId: runId }),
      });
      var data2 = await res2.json();

      // Capture domain/subdomain from first batch that returns it
      if (data2.query_domain && !s.domain) {
        s.domain = data2.query_domain;
        s.subdomain = data2.query_subdomain;
      }

      (data2.results || []).forEach(function(item) {
        s.evaluations[item.index] = { match: item.match, reason: item.reason };
      });
      var good = Object.values(s.evaluations).filter(function(e){return e.match;}).length;
      log('Batch ' + (Math.floor(i/BATCH)+1) + '/' + Math.ceil(toEval.length/BATCH) + ' - ' + good + ' fits so far.');
      updatePanel(query);
      updateSummaryRow(query);
    } catch(e) {
      log('Batch error: ' + e.message);
    }
  }

  var good = Object.values(s.evaluations).filter(function(e){return e.match;}).length;
  var total = toEval.length;
  var matchRate = total > 0 ? Math.round(good / total * 100) : 0;
  s.status = 'done';
  log('Done. ' + good + '/' + total + ' good fits.');
  updatePanel(query);
  updateSummaryRow(query);

  // Save run summary to Supabase
  try {
    await fetch(PROXY + '/api/runs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        runId: runId,
        query: query,
        queryDomain: s.domain,
        querySubdomain: s.subdomain,
        totalResults: total,
        goodFits: good,
        matchRate: matchRate,
      }),
    });
  } catch(e) {
    log('Warning: could not save run summary: ' + e.message);
  }
}

async function runAll() {
  var token = document.getElementById('token').value.trim();
  var rawQueries = document.getElementById('queries').value.trim();
  var pageSize = document.getElementById('pageSize').value;

  showError('');
  if (!token) { showError('JWT token is required.'); return; }
  if (!rawQueries) { showError('At least one query is required.'); return; }

  var queries = rawQueries.split('\n').map(function(q){return q.trim();}).filter(Boolean).slice(0, 10);
  if (!queries.length) { showError('No valid queries found.'); return; }

  var runId = 'run_' + Date.now();
  var box = document.getElementById('run-id-box');
  box.textContent = 'Run ID: ' + runId + ' - use this to query results in Supabase';
  box.style.display = '';

  queries.forEach(function(q) {
    state[q] = { status: 'queued', profiles: [], evaluations: {}, logs: [], domain: null, subdomain: null };
  });

  initUI(queries);
  setGlobalStatus('running');
  queries.forEach(function(q) { updateSummaryRow(q); updatePanel(q); });

  await Promise.all(queries.map(function(q) { return runQuery(q, token, pageSize, runId); }));
  setGlobalStatus('done');
}
</script>
</body>
</html>
